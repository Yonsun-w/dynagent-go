version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dynagent
      POSTGRES_USER: dynagent
      POSTGRES_PASSWORD: dynagent
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dynagent -d dynagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector:0.101.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
    volumes:
      - ./configs/otel-collector.yaml:/etc/otelcol/config.yaml:ro
