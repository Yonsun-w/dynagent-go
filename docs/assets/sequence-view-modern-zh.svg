<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1520" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172036"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#60A5FA" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; }
      .sub { font: 500 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #94A3B8; }
      .actor { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #E2E8F0; }
      .msg { font: 500 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #CBD5E1; }
    </style>
  </defs>
  <rect width="1600" height="760" rx="32" fill="url(#bg)"/>
  <text x="72" y="82" class="title">时序视图</text>
  <text x="72" y="112" class="sub">从任务接入到摘要输出的单次执行链路。</text>

  <g>
    <rect x="76" y="156" width="110" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="98" y="184" class="actor">调用方</text>
    <line x1="131" y1="214" x2="131" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="236" y="156" width="96" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="258" y="184" class="actor">API</text>
    <line x1="284" y1="214" x2="284" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="386" y="156" width="116" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="410" y="184" class="actor">引擎</text>
    <line x1="444" y1="214" x2="444" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="552" y="156" width="118" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="574" y="184" class="actor">记忆</text>
    <line x1="611" y1="214" x2="611" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="724" y="156" width="84" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="748" y="184" class="actor">AI</text>
    <line x1="766" y1="214" x2="766" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="862" y="156" width="100" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="882" y="184" class="actor">规则</text>
    <line x1="912" y1="214" x2="912" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="1014" y="156" width="124" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="1032" y="184" class="actor">沙箱</text>
    <line x1="1076" y1="214" x2="1076" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="1190" y="156" width="96" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="1212" y="184" class="actor">节点</text>
    <line x1="1238" y1="214" x2="1238" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>

    <rect x="1338" y="156" width="108" height="44" rx="18" fill="url(#chip)" stroke="#365985" filter="url(#shadow)"/>
    <text x="1360" y="184" class="actor">存储</text>
    <line x1="1392" y1="214" x2="1392" y2="690" stroke="#334155" stroke-width="2" stroke-dasharray="8 8"/>
  </g>

  <g stroke="#60A5FA" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <line x1="131" y1="252" x2="284" y2="252"/>
    <polygon points="284,252 272,246 272,258" fill="#60A5FA"/>
    <line x1="284" y1="300" x2="444" y2="300"/>
    <polygon points="444,300 432,294 432,306" fill="#60A5FA"/>
    <line x1="444" y1="348" x2="611" y2="348"/>
    <polygon points="611,348 599,342 599,354" fill="#60A5FA"/>
    <line x1="611" y1="388" x2="444" y2="388"/>
    <polygon points="444,388 456,382 456,394" fill="#60A5FA"/>
    <line x1="444" y1="436" x2="766" y2="436"/>
    <polygon points="766,436 754,430 754,442" fill="#60A5FA"/>
    <line x1="766" y1="476" x2="444" y2="476"/>
    <polygon points="444,476 456,470 456,482" fill="#60A5FA"/>
    <line x1="444" y1="524" x2="912" y2="524"/>
    <polygon points="912,524 900,518 900,530" fill="#60A5FA"/>
    <line x1="912" y1="564" x2="444" y2="564"/>
    <polygon points="444,564 456,558 456,570" fill="#60A5FA"/>
    <line x1="444" y1="612" x2="1076" y2="612"/>
    <polygon points="1076,612 1064,606 1064,618" fill="#60A5FA"/>
    <line x1="1076" y1="652" x2="1238" y2="652"/>
    <polygon points="1238,652 1226,646 1226,658" fill="#60A5FA"/>
    <line x1="1238" y1="692" x2="1076" y2="692"/>
    <polygon points="1076,692 1088,686 1088,698" fill="#60A5FA"/>
  </g>

  <g fill="#CBD5E1">
    <text x="166" y="242" class="msg">提交任务</text>
    <text x="330" y="290" class="msg">Run(task)</text>
    <text x="492" y="338" class="msg">召回候选节点</text>
    <text x="486" y="378" class="msg">候选节点集</text>
    <text x="584" y="426" class="msg">调用 route_next_node</text>
    <text x="576" y="466" class="msg">标准化决策</text>
    <text x="648" y="514" class="msg">准入校验</text>
    <text x="654" y="554" class="msg">允许 / 拒绝</text>
    <text x="736" y="602" class="msg">执行节点</text>
    <text x="1126" y="642" class="msg">只读 state</text>
    <text x="1126" y="682" class="msg">patch + output</text>
  </g>
</svg>
