  <path d="M126 257h18M135 248v18" stroke="#0F172A" stroke-width="3.2" stroke-linecap="round"/>
  <text x="182" y="258" class="card">调用方</text>
  <text x="182" y="286" class="meta">API / SDK / Worker</text>

  <rect x="84" y="370" width="260" height="150" rx="28" fill="url(#panel)" stroke="#24324D" filter="url(#shadow)"/>
  <rect x="110" y="396" width="50" height="50" rx="16" fill="url(#accent2)"/>
