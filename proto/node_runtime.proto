syntax = "proto3";

package dynagent.noderuntime.v1;

option go_package = "github.com/admin/ai_project/pkg/contracts";

message Empty {}

message MetaResponse {
  string id = 1;
  string version = 2;
  string description = 3;
}

message CheckRequest {
  string trace_id = 1;
  bytes state_json = 2;
}

message CheckResponse {
  bool allowed = 1;
  string reason = 2;
}

message ExecuteRequest {
  string trace_id = 1;
  bytes state_json = 2;
}

message ExecuteResponse {
  bool success = 1;
  string error = 2;
  bytes result_json = 3;
}

service NodeRuntime {
  rpc GetMeta(Empty) returns (MetaResponse);
  rpc Check(CheckRequest) returns (CheckResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
}
