<svg width="1600" height="680" viewBox="0 0 1600 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1480" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172036"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="acc1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#FCA5A5"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .sub { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94A3B8; }
      .card { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .meta { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94A3B8; }
      .code { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #BFDBFE; }
    </style>
  </defs>

  <rect width="1600" height="680" rx="32" fill="url(#bg)"/>
  <text x="72" y="82" class="title">AI Decision Flow</text>
  <text x="72" y="112" class="sub">What the model sees, what it returns, and what the runtime accepts.</text>

  <rect x="96" y="184" width="404" height="208" rx="28" fill="url(#card)" stroke="#27416A" filter="url(#shadow)"/>
  <rect x="126" y="214" width="52" height="52" rx="16" fill="url(#acc1)"/>
  <text x="198" y="244" class="card">Prompt Context</text>
  <text x="126" y="300" class="code">task_id</text>
  <text x="126" y="326" class="code">user_input</text>
  <text x="126" y="352" class="code">state snapshot</text>
  <text x="126" y="378" class="code">candidate nodes</text>

  <rect x="598" y="184" width="404" height="208" rx="28" fill="url(#card)" stroke="#27416A" filter="url(#shadow)"/>
  <rect x="628" y="214" width="52" height="52" rx="16" fill="url(#acc2)"/>
  <text x="700" y="244" class="card">Decision Payload</text>
  <text x="628" y="300" class="code">{</text>
  <text x="656" y="300" class="code">"next_node": "..."</text>
  <text x="656" y="326" class="code">"reasoning": "..."</text>
  <text x="656" y="352" class="code">"data": { ... }</text>
  <text x="628" y="378" class="code">}</text>

  <rect x="1100" y="184" width="404" height="208" rx="28" fill="url(#card)" stroke="#27416A" filter="url(#shadow)"/>
  <rect x="1130" y="214" width="52" height="52" rx="16" fill="url(#acc1)"/>
  <text x="1202" y="244" class="card">Acceptance Gate</text>
  <text x="1130" y="300" class="code">node exists?</text>
  <text x="1130" y="326" class="code">rules pass?</text>
  <text x="1130" y="352" class="code">loop / timeout pass?</text>
  <text x="1130" y="378" class="code">then sandbox execute</text>

  <path d="M500 288H598M1002 288H1100" stroke="#60A5FA" stroke-width="4" stroke-linecap="round"/>

  <rect x="450" y="494" width="700" height="88" rx="24" fill="#101827" stroke="#27416A"/>
  <text x="490" y="546" class="code">AI can choose any node. Runtime decides whether that choice becomes a valid executable step.</text>
</svg>
