    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; }
      .sub { font: 500 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #94A3B8; }
      .section { font: 700 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #CBD5E1; letter-spacing: 0.12em; }
      .card { font: 700 20px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; }
      .meta { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #94A3B8; }
      .code { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #BFDBFE; }
    </style>
  </defs>
  <rect width="1600" height="960" rx="32" fill="url(#bg)"/>
  <text x="84" y="84" class="title">DynAgent 架构图</text>
  <text x="84" y="116" class="sub">无预设拓扑执行内核：AI 负责路由，Runtime 负责约束，调度器负责状态所有权。</text>

  <text x="84" y="164" class="section">接入层</text>
  <text x="432" y="164" class="section">运行时内核</text>
  <text x="1110" y="164" class="section">执行与数据层</text>

  <rect x="84" y="206" width="260" height="126" rx="28" fill="url(#panel)" stroke="#24324D" filter="url(#shadow)"/>
